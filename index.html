<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Business Card Layout</title>

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Font -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Business Card -->

    <section class="card-container">

        <!-- Front Card -->

        <div class="business-card">

            <!-- Glow -->

            <div class="glow"></div>

            <!-- Top -->

            <div class="top">

                <div class="logo">

                    D

                </div>

                <span class="brand">
                    Delin Studio
                </span>

            </div>

            <!-- Main Content -->

            <div class="content">

                <h1>
                    Delin
                </h1>

                <h3>
                    Frontend Developer
                </h3>

                <p>
                    Building modern responsive
                    websites and creative UI
                    experiences.
                </p>

            </div>

            <!-- Contact -->

            <div class="contact">

                <div class="info">

                    <i class="fa-solid fa-envelope"></i>

                    <span>
                        delin@example.com
                    </span>

                </div>

                <div class="info">

                    <i class="fa-solid fa-phone"></i>

                    <span>
                        +91 98765 43210
                    </span>

                </div>

                <div class="info">

                    <i class="fa-solid fa-globe"></i>

                    <span>
                        www.delinstudio.com
                    </span>

                </div>

            </div>

        </div>

    </section>

    <!-- JavaScript -->

    <script src="script.js"></script>

</body>

</html>
